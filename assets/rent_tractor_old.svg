<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdba74" />
      <stop offset="60%" stop-color="#fed7aa" />
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ca8a04" />
      <stop offset="100%" stop-color="#854d0e" />
    </linearGradient>
    <linearGradient id="tractorGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#b91c1c" />
    </linearGradient>
    <filter id="dropshadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Sky Background -->
  <rect width="500" height="240" fill="url(#skyGrad)"/>
  
  <!-- Sun -->
  <circle cx="250" cy="180" r="70" fill="#fef08a" opacity="0.35" filter="blur(15px)" />
  
  <!-- Distant Trees -->
  <path d="M 0,210 Q 50,190 100,210 T 200,210 T 300,210 T 400,210 T 500,210 L 500,240 L 0,240 Z" fill="#b45309" opacity="0.6"/>

  <!-- Ground -->
  <rect y="235" width="500" height="165" fill="url(#groundGrad)"/>
  <path d="M 0,235 C 100,230 400,240 500,235" stroke="#b45309" stroke-width="4" fill="none"/>

  <!-- TRACTOR GROUP -->
  <g transform="translate(110, 120)" filter="url(#dropshadow)">
    <!-- Rear Mudguard/Fender -->
    <path d="M 170,110 A 75,75 0 0,0 20,110" fill="#dc2626" stroke="#b91c1c" stroke-width="4"/>
    <path d="M 15,110 L 5,120 L 25,130 Z" fill="#991b1b"/>
    
    <!-- Exhaust Pipe -->
    <rect x="230" y="10" width="8" height="85" fill="#475569" rx="3" />
    <path d="M 230,10 Q 225,5 220,10 L 225,15" stroke="#475569" stroke-width="3" fill="none" />
    <line x1="234" y1="95" x2="234" y2="130" stroke="#334155" stroke-width="12" />

    <!-- Tractor Engine Block / Bonnet -->
    <path d="M 120,95 L 250,95 L 250,145 L 120,145 Z" fill="url(#tractorGrad)" stroke="#991b1b" stroke-width="3"/>
    
    <!-- Radiator Grill -->
    <rect x="245" y="100" width="8" height="40" fill="#1e293b" rx="2"/>
    <line x1="249" y1="105" x2="249" y2="135" stroke="#f1f5f9" stroke-width="2" stroke-dasharray="1,3"/>
    
    <!-- Tractor Cabin / Driver Steering Column -->
    <circle cx="120" cy="80" r="15" fill="none" stroke="#dc2626" stroke-width="4" />
    <line x1="120" y1="95" x2="110" y2="70" stroke="#1e293b" stroke-width="5" />
    <circle cx="110" cy="70" r="10" fill="none" stroke="#1e293b" stroke-width="3" />

    <!-- Vintage Headlight -->
    <circle cx="255" cy="110" r="9" fill="#fef08a" stroke="#475569" stroke-width="2"/>
    <path d="M 264,110 Q 285,112 300,115" stroke="#fef08a" stroke-width="3" fill="none" opacity="0.3"/>

    <!-- Wheel Hub Connections -->
    <rect x="75" y="145" width="40" height="20" fill="#334155" />
    <rect x="200" y="145" width="25" height="15" fill="#334155" />

    <!-- Massive Rear Wheel -->
    <circle cx="95" cy="165" r="55" fill="#1e2d3d" stroke="#0f172a" stroke-width="10" />
    <circle cx="95" cy="165" r="30" fill="#b91c1c" />
    <circle cx="95" cy="165" r="12" fill="#475569" />
    <!-- Rear Wheel Treads -->
    <line x1="95" y1="110" x2="95" y2="125" stroke="#0f172a" stroke-width="6" stroke-linecap="round" />
    <line x1="95" y1="205" x2="95" y2="220" stroke="#0f172a" stroke-width="6" stroke-linecap="round" />
    <line x1="40" y1="165" x2="55" y2="165" stroke="#0f172a" stroke-width="6" stroke-linecap="round" />
    <line x1="135" y1="165" x2="150" y2="165" stroke="#0f172a" stroke-width="6" stroke-linecap="round" />
    <line x1="56" y1="126" x2="68" y2="138" stroke="#0f172a" stroke-width="6" stroke-linecap="round" />
    <line x1="134" y1="126" x2="122" y2="138" stroke="#0f172a" stroke-width="6" stroke-linecap="round" />
    <line x1="56" y1="204" x2="68" y2="192" stroke="#0f172a" stroke-width="6" stroke-linecap="round" />
    <line x1="134" y1="204" x2="122" y2="192" stroke="#0f172a" stroke-width="6" stroke-linecap="round" />

    <!-- Front Wheel -->
    <circle cx="212" cy="180" r="30" fill="#1e2d3d" stroke="#0f172a" stroke-width="6" />
    <circle cx="212" cy="180" r="14" fill="#b91c1c" />
    <circle cx="212" cy="180" r="6" fill="#475569" />
  </g>

  <!-- Labels -->
  <text x="30" y="45" font-family="monospace" font-size="12" fill="#f97316" font-weight="bold" letter-spacing="1">MACHINERY REGISTER: RENTALS</text>
  <text x="30" y="65" font-family="sans-serif" font-size="16" font-weight="black" fill="#ffffff">VINTAGE 50 HP RED TRACTOR</text>
</svg>
