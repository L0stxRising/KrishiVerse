<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fd00ff" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="fieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="40%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#ca8a04" />
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#991b1b" />
    </linearGradient>
    <filter id="dropshadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="500" height="220" fill="url(#skyGrad)"/>
  
  <!-- Beautiful Sun -->
  <circle cx="380" cy="110" r="45" fill="#fef08a" opacity="0.6" filter="blur(8px)"/>

  <!-- Golden Crops / Wheat Field -->
  <rect y="210" width="500" height="190" fill="url(#fieldGrad)"/>
  
  <!-- Wheat crop stalks texture -->
  <g stroke="#b45309" stroke-width="1.5" opacity="0.7" stroke-linecap="round">
    <line x1="20" y1="210" x2="20" y2="190" />
    <line x1="50" y1="220" x2="45" y2="195" />
    <line x1="90" y1="210" x2="95" y2="185" />
    <line x1="130" y1="225" x2="125" y2="200" />
    <line x1="390" y1="220" x2="385" y2="195" />
    <line x1="430" y1="215" x2="435" y2="190" />
    <line x1="470" y1="225" x2="465" y2="200" />
  </g>

  <!-- MASTER COMBINE HARVESTER -->
  <g transform="translate(60, 90)" filter="url(#dropshadow)">
    <!-- Unloading Augur arm tube -->
    <rect x="20" y="32" width="135" height="12" fill="#e2e8f0" rx="3" transform="rotate(-18, 20, 32)"/>
    <rect x="145" y="-12" width="12" height="18" fill="#475569" />

    <!-- Solid Harvester Frame / Crop Tank Box -->
    <path d="M 80,45 L 255,45 Q 262,45 262,55 L 250,135 L 75,135 Z" fill="url(#bodyGrad)" stroke="#7f1d1d" stroke-width="3.5"/>
    
    <!-- Driver Glass Cabin (High-situated, panoramic) -->
    <path d="M 235,15 L 295,15 Q 302,20 300,32 L 285,75 L 230,75 Z" fill="#38bdf8" opacity="0.4" stroke="#1e293b" stroke-width="2.5" />
    <path d="M 235,15 L 295,15 L 288,20 L 235,20 Z" fill="#ef4444" />
    <rect x="228" y="25" width="4" height="50" fill="#1e293b" />
    <circle cx="250" cy="45" r="8" fill="#1e293b" /> <!-- Driver outline -->
    
    <!-- Ladders / Access Gantry Railing -->
    <line x1="212" y1="75" x2="192" y2="135" stroke="#94a3b8" stroke-width="3" />
    <line x1="222" y1="75" x2="202" y2="135" stroke="#94a3b8" stroke-width="3"/>
    <line x1="207" y1="90" x2="217" y2="90" stroke="#94a3b8" stroke-width="2" />
    <line x1="202" y1="110" x2="212" y2="110" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />

    <!-- Harvesting Header arm brackets -->
    <path d="M 250,115 L 315,145 L 305,160 L 245,125 Z" fill="#1e293b" />
    
    <!-- Spinning Reel Header (Yellow crop cutter spinning spool) -->
    <g transform="translate(305, 140)">
      <!-- Supporting Disc -->
      <circle cx="25" cy="25" r="32" fill="#ca8a04" stroke="#111" stroke-width="2" opacity="0.8"/>
      <!-- Internal blades -->
      <line x1="25" y1="-7" x2="25" y2="57" stroke="#111" stroke-width="4" />
      <line x1="-7" y1="25" x2="57" y2="25" stroke="#111" stroke-width="4" />
      <line x1="2" y1="2" x2="48" y2="48" stroke="#111" stroke-width="3" />
      <line x1="48" y1="2" x2="2" y2="48" stroke="#111" stroke-width="3" />
      <circle cx="25" cy="25" r="14" fill="#334155" />
      <!-- Golden tines/blades -->
      <path d="M 25,-7 L 35,-22 L 30,-23" stroke="#eab308" stroke-width="2" fill="none"/>
      <path d="M 57,25 L 72,35 L 73,30" stroke="#eab308" stroke-width="2" fill="none"/>
      <path d="M 25,57 L 15,72 L 20,73" stroke="#eab308" stroke-width="2" fill="none"/>
      <path d="M -7,25 L -22,15 L -23,20" stroke="#eab308" stroke-width="2" fill="none"/>
    </g>

    <!-- Wheels (Giant front drive wheel, smaller rear steering wheel) -->
    <!-- Giant Front Wheel -->
    <circle cx="230" cy="150" r="42" fill="#1e293b" stroke="#000" stroke-width="8"/>
    <circle cx="230" cy="150" r="18" fill="#e2e8f0" />
    <circle cx="230" cy="150" r="8" fill="#475569" />

    <!-- Steering Rear Wheel -->
    <circle cx="112" cy="160" r="24" fill="#1e293b" stroke="#000" stroke-width="5"/>
    <circle cx="112" cy="160" r="10" fill="#e2e8f0" />
    <circle cx="112" cy="160" r="4" fill="#475569" />
  </g>

  <!-- Labels -->
  <text x="30" y="45" font-family="monospace" font-size="12" fill="#f87171" font-weight="bold" letter-spacing="1">MACHINERY REGISTER: RENTALS</text>
  <text x="30" y="65" font-family="sans-serif" font-size="16" font-weight="black" fill="#ffffff">SWARAJ MULTI-CROP COMBINE HARVESTER</text>
</svg>
