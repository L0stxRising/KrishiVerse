<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="60%" stop-color="#059669" />
      <stop offset="100%" stop-color="#064e3b" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
    <radialGradient id="veinGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a7f3d0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Outer Card Background -->
  <rect width="500" height="400" rx="24" fill="url(#bgGrad)"/>
  
  <!-- Ambient glow background grid -->
  <circle cx="250" cy="200" r="180" fill="#059669" opacity="0.08" filter="blur(40px)" />

  <g transform="translate(250, 200) rotate(-15)" filter="url(#shadow)">
    <!-- Main Leaf Body -->
    <path d="M 0,-150 
             C 80,-80 140,-10 140,40
             C 140,110 80,150 0,150
             C -80,150 -140,110 -140,40
             C -140,-10 -80,-80 0,-150 Z" 
          fill="url(#leafGrad)"/>
    
    <!-- Leaf Stem / Main Vein -->
    <path d="M 0,-155 L 0,180" stroke="#a7f3d0" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
    
    <!-- Secondary Veins -->
    <path d="M 0,-80 Q 40,-100 80,-90" stroke="#a7f3d0" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M 0,-80 Q -40,-100 -80,-90" stroke="#a7f3d0" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round"/>
    
    <path d="M 0,-30 Q 50,-50 105,-35" stroke="#a7f3d0" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M 0,-30 Q -50,-50 -105,-35" stroke="#a7f3d0" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round"/>
    
    <path d="M 0,20 Q 60,0 120,20" stroke="#a7f3d0" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M 0,20 Q -60,0 -120,20" stroke="#a7f3d0" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round"/>
    
    <path d="M 0,70 Q 50,55 100,85" stroke="#a7f3d0" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M 0,70 Q -50,55 -100,85" stroke="#a7f3d0" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round"/>

    <!-- Water Droplets for realism -->
    <circle cx="45" cy="-20" r="8" fill="#ffffff" opacity="0.25"/>
    <circle cx="43" cy="-22" r="3" fill="#ffffff" opacity="0.5"/>
    
    <circle cx="-35" cy="50" r="10" fill="#ffffff" opacity="0.2"/>
    <circle cx="-38" cy="48" r="4" fill="#ffffff" opacity="0.5"/>
  </g>
  
  <!-- Info overlay text in mono top left -->
  <text x="30" y="45" font-family="monospace" font-size="12" fill="#34d399" letter-spacing="1.5" opacity="0.8">SYSTEM STATUS: OPTIMAL</text>
  <text x="30" y="65" font-family="monospace" font-size="16" font-weight="bold" fill="#ffffff">HEALTHY CROP LEAF</text>
</svg>
