<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="60%" stop-color="#15803d" />
      <stop offset="100%" stop-color="#052e16" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="mildewBlur">
      <feGaussianBlur stdDeviation="8" />
    </filter>
  </defs>
  
  <rect width="500" height="400" rx="24" fill="url(#bgGrad)"/>
  <circle cx="250" cy="200" r="180" fill="#cbd5e1" opacity="0.05" filter="blur(40px)" />

  <g transform="translate(250, 200) rotate(-15)" filter="url(#shadow)">
    <!-- Leaf Body -->
    <path d="M 0,-150 
             C 80,-80 140,-10 140,40
             C 140,110 80,150 0,150
             C -80,150 -140,110 -140,40
             C -140,-10 -80,-80 0,-150 Z" 
          fill="url(#leafGrad)"/>
    
    <path d="M 0,-155 L 0,180" stroke="#86efac" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
    
    <!-- Secondary Veins -->
    <path d="M 0,-80 Q 40,-100 80,-90" stroke="#86efac" stroke-width="2.5" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M 0,-80 Q -40,-100 -80,-90" stroke="#86efac" stroke-width="2.5" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M 0,-30 Q 50,-50 105,-35" stroke="#86efac" stroke-width="2.5" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M 0,-30 Q -50,-50 -105,-35" stroke="#86efac" stroke-width="2.5" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M 0,20 Q 60,0 120,20" stroke="#86efac" stroke-width="2.5" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M 0,20 Q -60,0 -120,20" stroke="#86efac" stroke-width="2.5" fill="none" opacity="0.4" stroke-linecap="round"/>

    <!-- Powdery Mildew Dusty Patches (diffuse, whitish clouds with blurred edges) -->
    <ellipse cx="25" cy="-60" rx="35" ry="25" fill="#f1f5f9" opacity="0.55" filter="url(#mildewBlur)" />
    <circle cx="35" cy="-55" r="10" fill="#ffffff" opacity="0.6" filter="url(#mildewBlur)" />

    <ellipse cx="-45" cy="10" rx="40" ry="20" fill="#f1f5f9" opacity="0.6" filter="url(#mildewBlur)" />
    <circle cx="-50" cy="5" r="12" fill="#ffffff" opacity="0.5" filter="url(#mildewBlur)" />

    <ellipse cx="35" cy="40" rx="30" ry="30" fill="#f1f5f9" opacity="0.5" filter="url(#mildewBlur)" />
    
    <ellipse cx="-15" cy="80" rx="45" ry="25" fill="#f1f5f9" opacity="0.6" filter="url(#mildewBlur)" />
    <circle cx="-10" cy="85" r="15" fill="#ffffff" opacity="0.4" filter="url(#mildewBlur)" />

    <!-- Necrotic dry leaf spots around mildew -->
    <circle cx="20" cy="-50" r="4" fill="#451a03" />
    <circle cx="-35" cy="15" r="3" fill="#451a03" />
    <circle cx="-25" cy="75" r="4" fill="#451a03" />
  </g>
  
  <text x="30" y="45" font-family="monospace" font-size="12" fill="#e2e8f0" letter-spacing="1.5" opacity="0.8">FUNGAL PATHOGEN: HIGH</text>
  <text x="30" y="65" font-family="monospace" font-size="16" font-weight="bold" fill="#ffffff">POWDERY MILDEW FUNGI</text>
</svg>
