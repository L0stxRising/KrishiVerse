<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="60%" stop-color="#bae6fd" />
      <stop offset="100%" stop-color="#84cc16" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a16207" />
      <stop offset="100%" stop-color="#713f12" />
    </linearGradient>
    <linearGradient id="tractorGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ade80" />
      <stop offset="100%" stop-color="#15803d" />
    </linearGradient>
    <linearGradient id="wagonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f87171" />
      <stop offset="100%" stop-color="#b91c1c" />
    </linearGradient>
    <filter id="dropshadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="500" height="240" fill="url(#skyGrad)"/>
  
  <!-- Fluffy Cloud -->
  <path d="M 320,100 Q 340,80 370,90 Q 390,70 410,95 Q 430,95 435,115 L 315,115 Z" fill="#ffffff" opacity="0.6" filter="blur(2px)"/>

  <!-- Field -->
  <rect y="235" width="500" height="165" fill="url(#groundGrad)"/>
  <line x1="0" y1="235" x2="500" y2="235" stroke="#4d7c0f" stroke-width="6"/>

  <!-- CARGO TRAILER & MODERN TRACTOR COMBO -->
  <g transform="translate(40, 115)" filter="url(#dropshadow)">
    <!-- DRAWBAR / COUPLING -->
    <rect x="200" y="150" width="35" height="10" fill="#475569" stroke="#334155" />
    
    <!-- RED HEAVY TRANSPORT TRAILER -->
    <g transform="translate(15, 60)">
      <!-- Cargo Body -->
      <path d="M 0,0 L 190,0 Q 195,10 195,20 L 185,85 L 5,85 Z" fill="url(#wagonGrad)" stroke="#991b1b" stroke-width="3"/>
      <!-- Support Ribs -->
      <rect x="35" y="0" width="8" height="85" fill="#7f1d1d" />
      <rect x="85" y="0" width="8" height="85" fill="#7f1d1d" />
      <rect x="135" y="0" width="8" height="85" fill="#7f1d1d" />
      
      <!-- Cage Net/Fittings -->
      <rect x="5" y="-15" width="180" height="15" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="8,4" />
      
      <!-- Trailer Wheels -->
      <circle cx="55" cy="100" r="30" fill="#334155" stroke="#0f172a" stroke-width="6"/>
      <circle cx="55" cy="100" r="10" fill="#94a3b8"/>
      <circle cx="130" cy="100" r="30" fill="#334155" stroke="#0f172a" stroke-width="6"/>
      <circle cx="130" cy="100" r="10" fill="#94a3b8"/>
    </g>

    <!-- GREEN TRACTOR -->
    <g transform="translate(225, 45)">
      <!-- Cabin Glass & Roof -->
      <path d="M 12,20 L 72,20 L 52,95 L 3,95 Z" fill="#38bdf8" opacity="0.4" stroke="#475569" stroke-width="2"/>
      <path d="M 12,20 L 72,20 L 55,25 L 5,25 Z" fill="#15803d" />
      <rect x="5" y="15" width="8" height="80" fill="#1e293b" />
      <rect x="68" y="15" width="6" height="80" fill="#1e293b" />

      <!-- Engine Compartment -->
      <path d="M 72,60 L 165,60 L 165,110 L 72,110 Z" fill="url(#tractorGrad)" stroke="#166534" stroke-width="3"/>
      <rect x="165" y="65" width="8" height="35" fill="#0f172a" rx="2" />
      
      <!-- Exhaust Stack -->
      <rect x="145" y="15" width="6" height="45" fill="#1e293b" rx="2" />

      <!-- High-Power Wheel Rear -->
      <circle cx="45" cy="115" r="45" fill="#1e293b" stroke="#020617" stroke-width="8"/>
      <circle cx="45" cy="115" r="22" fill="#ca8a04" />
      <circle cx="45" cy="115" r="8" fill="#475569" />

      <!-- Front Wheel -->
      <circle cx="140" cy="130" r="30" fill="#1e293b" stroke="#020617" stroke-width="6"/>
      <circle cx="140" cy="130" r="14" fill="#ca8a04" />
      <circle cx="140" cy="130" r="6" fill="#475569" />
    </g>
  </g>

  <!-- Labels -->
  <text x="30" y="45" font-family="monospace" font-size="12" fill="#84cc16" font-weight="bold" letter-spacing="1">MACHINERY REGISTER: RENTALS</text>
  <text x="30" y="65" font-family="sans-serif" font-size="16" font-weight="black" fill="#ffffff">JOHN DEERE POWER TRACTOR &amp; CARGO WAGON</text>
</svg>
